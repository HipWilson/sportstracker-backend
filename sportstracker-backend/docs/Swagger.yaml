openapi: 3.0.3
info:
  title: SportsTracker API
  description: |
    REST API para rastrear series y documentales deportivos.
    Permite crear, editar, eliminar y calificar series con soporte para imágenes,
    paginación, búsqueda y ordenamiento.
  version: 1.0.0
  contact:
    name: SportsTracker

servers:
  - url: http://localhost:8080
    description: Desarrollo local
  - url: https://your-railway-app.up.railway.app
    description: Producción

tags:
  - name: Series
    description: Operaciones sobre series deportivas
  - name: Ratings
    description: Sistema de calificaciones

paths:
  /series:
    get:
      tags: [Series]
      summary: Listar todas las series
      description: Retorna una lista paginada de series con soporte de búsqueda y ordenamiento.
      parameters:
        - name: q
          in: query
          description: Búsqueda por título, descripción o deporte
          schema:
            type: string
          example: "Formula 1"
        - name: page
          in: query
          description: Número de página
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Resultados por página (máximo 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          description: Campo por el que ordenar
          schema:
            type: string
            enum: [title, sport, year, created_at, rating]
            default: created_at
        - name: order
          in: query
          description: Dirección del ordenamiento
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
        - name: sport
          in: query
          description: Filtrar por deporte específico
          schema:
            type: string
        - name: status
          in: query
          description: Filtrar por estado
          schema:
            type: string
            enum: [pending, watching, completed, dropped]
      responses:
        '200':
          description: Lista de series paginada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSeries'
    post:
      tags: [Series]
      summary: Crear una serie nueva
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeriesInput'
            example:
              title: "Drive to Survive"
              sport: "Formula 1"
              platform: "Netflix"
              status: "watching"
              episodes: 10
              year: 2019
              description: "Documental detrás de cámaras de la Fórmula 1"
      responses:
        '201':
          description: Serie creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Series'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /series/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Series]
      summary: Obtener una serie por ID
      responses:
        '200':
          description: Serie encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Series'
        '404':
          description: Serie no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [Series]
      summary: Editar una serie existente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeriesInput'
      responses:
        '200':
          description: Serie actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Series'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Serie no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Series]
      summary: Eliminar una serie
      responses:
        '204':
          description: Serie eliminada exitosamente
        '404':
          description: Serie no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /series/{id}/image:
    post:
      tags: [Series]
      summary: Subir imagen de portada
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Imagen (máximo 1MB, formatos jpg/png/webp/gif)
      responses:
        '200':
          description: Imagen subida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  image_url:
                    type: string
        '400':
          description: Archivo inválido o demasiado grande
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Serie no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /series/{id}/rating:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Ratings]
      summary: Obtener calificaciones de una serie
      responses:
        '200':
          description: Lista de calificaciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingList'
        '404':
          description: Serie no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Ratings]
      summary: Agregar una calificación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingInput'
            example:
              score: 9
              comment: "Excelente documental, muy emocionante"
      responses:
        '201':
          description: Calificación creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        '400':
          description: Score inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Serie no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /series/{id}/rating/{ratingId}:
    delete:
      tags: [Ratings]
      summary: Eliminar una calificación
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: ratingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Calificación eliminada
        '404':
          description: Calificación no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Series:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        sport:
          type: string
        platform:
          type: string
        status:
          type: string
          enum: [pending, watching, completed, dropped]
        episodes:
          type: integer
        year:
          type: integer
          nullable: true
        description:
          type: string
        image_url:
          type: string
        avg_rating:
          type: number
          format: float
          nullable: true
        rating_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SeriesInput:
      type: object
      required: [title, sport]
      properties:
        title:
          type: string
          maxLength: 200
        sport:
          type: string
        platform:
          type: string
        status:
          type: string
          enum: [pending, watching, completed, dropped]
          default: pending
        episodes:
          type: integer
          minimum: 0
        year:
          type: integer
          minimum: 1900
          maximum: 2100
          nullable: true
        description:
          type: string
        image_url:
          type: string

    PaginatedSeries:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Series'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    Rating:
      type: object
      properties:
        id:
          type: integer
        series_id:
          type: integer
        score:
          type: integer
          minimum: 1
          maximum: 10
        comment:
          type: string
        created_at:
          type: string
          format: date-time

    RatingInput:
      type: object
      required: [score]
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 10
        comment:
          type: string

    RatingList:
      type: object
      properties:
        ratings:
          type: array
          items:
            $ref: '#/components/schemas/Rating'
        count:
          type: integer
        avg_score:
          type: number
          format: float
          nullable: true

    Error:
      type: object
      properties:
        error:
          type: string

    ValidationError:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
          additionalProperties:
            type: string